name: Feature Request
description: Suggest an idea for Comber
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Be specific.
      placeholder: I'm frustrated when I have to ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, references, or links that help explain the request

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell
      - name: Lint
        run: pwsh ./tests/Invoke-StaticChecks.ps1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell
      - name: Test fixture pipeline
        run: pwsh ./tests/Invoke-FixturePipeline.ps1

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install PowerShell
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            sudo apt-get update && sudo apt-get install -y powershell
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            brew install --cask powershell
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            winget install --id Microsoft.PowerShell --source winget
          fi
      - name: Run static checks
        shell: pwsh
        run: pwsh ./tests/Invoke-StaticChecks.ps1

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install PowerShell
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            sudo apt-get update && sudo apt-get install -y powershell
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            brew install --cask powershell
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            winget install --id Microsoft.PowerShell --source winget
          fi
      - name: Run fixture pipeline
        shell: pwsh
        run: pwsh ./tests/Invoke-FixturePipeline.ps1

  unit-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install PowerShell
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            sudo apt-get update && sudo apt-get install -y powershell
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            brew install --cask powershell
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            winget install --id Microsoft.PowerShell --source winget
          fi
      - name: Run unit tests
        shell: pwsh
        run: pwsh ./tests/Invoke-UnitTests.ps1
